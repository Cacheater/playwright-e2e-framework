name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to push the Allure report to gh-pages

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      STORE_USER: ${{ secrets.STORE_USER }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Fetch Allure history from gh-pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history into results
        continue-on-error: true
        run: cp -r gh-pages/history allure-results/history

      - name: Generate BDD test files
        run: npx bddgen

      # automationteststore.com is unreachable from CI runners — only SauceDemo runs here.
      - name: Run POM tests — SauceDemo (Chromium)
        run: npx playwright test tests/login.spec.ts --project=chromium

      - name: Run BDD tests — SauceDemo (Chromium)
        run: npx playwright test --project=bdd-chromium --grep "@saucedemo"

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          keep_files: false

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
