name: Playwright E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      STORE_USER: ${{ secrets.STORE_USER }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download previous Allure history
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: allure-results/history
        continue-on-error: true

      - name: Generate BDD test files
        run: npx bddgen

      # automationteststore.com is an external site that is unreachable from CI runners.
      # Only SauceDemo tests run in CI; store tests run locally.
      - name: Run POM tests — SauceDemo (Chromium)
        run: npx playwright test tests/login.spec.ts --project=chromium

      - name: Run BDD tests — SauceDemo (Chromium)
        run: npx playwright test --project=bdd-chromium --grep "@saucedemo"

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-report/history
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14
